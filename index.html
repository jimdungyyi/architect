<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architect - RedClex</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="hero-section">
        <video class="hero-bg-video" autoplay loop muted playsinline>
            <source src="architect.mp4" type="video/mp4">
        </video>

        <div class="hero-overlay"></div>

        <div class="hero-bg-grid"></div>
        <div class="hero-glow"></div>

        <div class="hero-content">
            <h1 class="main-title">성장하고 싶은 강사님들을 위한 워크스페이스</h1>
            <p class="sub-title">
                복잡한 관리는 아키텍트의 몫입니다.<br>
                강사님의 내일이 더 빛날 수 있도록 설계합니다.
            </p>
            <button class="cta-button">아키텍트 시작하기</button>
        </div>

        <div class="scroll-indicator">
            <div class="mouse">
                <div class="wheel"></div>
            </div>
            <span class="scroll-text">Scroll Down</span>
        </div>
    </header>

</body>
</html>
